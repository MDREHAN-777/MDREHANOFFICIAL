<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR7 WORLD</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
overflow:hidden;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 3s forwards 3s;
}

#intro img{
width:150px;
animation:zoom 3s ease;
}

@keyframes zoom{
0%{transform:scale(0);opacity:0}
100%{transform:scale(1);opacity:1}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#111;
}

button{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
background:#00ff99;
color:black;
font-weight:bold;
}

#dashboard, #gameScreen{
display:none;
padding:10px;
}

canvas{
background:black;
display:block;
margin:auto;
border:2px solid #00ff99;
}

input{
padding:8px;
border-radius:5px;
border:none;
}

@media(max-width:600px){
canvas{width:95%;}
}
</style>
</head>
<body>

<div id="intro">
<img src="logo.png">
<h1 style="color:#00ff99;">MR7 WORLD</h1>
</div>

<header>
<h2>MR7 WORLD</h2>
<div id="coins">Coins: 0</div>
</header>

<div id="login" style="text-align:center;margin-top:50px;">
<input id="username" placeholder="Enter Username">
<button onclick="login()">Login</button>
</div>

<div id="dashboard">
<h3>Welcome <span id="user"></span></h3>
<button onclick="openGame('snake')">Snake Game</button>
<button onclick="openGame('ttt')">TicTacToe</button>
<button onclick="openGame('ai')">MR7 AI</button>
</div>

<div id="gameScreen">
<button onclick="back()">⬅ Back</button>
<div id="gameArea"></div>
</div>

<script>
let coins = localStorage.getItem("coins") || 0;
document.getElementById("coins").innerText="Coins: "+coins;

function login(){
let name=document.getElementById("username").value;
if(name){
localStorage.setItem("user",name);
start(name);
}
}

function start(name){
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("user").innerText=name;
}

if(localStorage.getItem("user")){
start(localStorage.getItem("user"));
}

function openGame(game){
document.getElementById("dashboard").style.display="none";
document.getElementById("gameScreen").style.display="block";
let area=document.getElementById("gameArea");
area.innerHTML="";

if(game==="snake"){snakeGame();}
if(game==="ttt"){ticTac();}
if(game==="ai"){aiChat();}
}

function back(){
document.getElementById("dashboard").style.display="block";
document.getElementById("gameScreen").style.display="none";
}

//////////////////// SNAKE ////////////////////
function snakeGame(){
let canvas=document.createElement("canvas");
canvas.width=300;
canvas.height=300;
let ctx=canvas.getContext("2d");
document.getElementById("gameArea").appendChild(canvas);

let snake=[{x:150,y:150}];
let dx=10,dy=0;
let food={x:Math.random()*290,y:Math.random()*290};

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"){dx=0;dy=-10}
if(e.key==="ArrowDown"){dx=0;dy=10}
if(e.key==="ArrowLeft"){dx=-10;dy=0}
if(e.key==="ArrowRight"){dx=10;dy=0}
});

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,300,300);

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,10,10);

snake.unshift({x:snake[0].x+dx,y:snake[0].y+dy});

if(Math.abs(snake[0].x-food.x)<10 && Math.abs(snake[0].y-food.y)<10){
food={x:Math.random()*290,y:Math.random()*290};
coins++;
localStorage.setItem("coins",coins);
document.getElementById("coins").innerText="Coins: "+coins;
}else{
snake.pop();
}

ctx.fillStyle="#00ff99";
snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));
}

setInterval(draw,100);
}

//////////////////// TIC TAC TOE ////////////////////
function ticTac(){
let board=["","","","","","","","",""];
let turn="X";
let div=document.createElement("div");
div.style.display="grid";
div.style.gridTemplateColumns="repeat(3,100px)";
div.style.gap="5px";

board.forEach((_,i)=>{
let cell=document.createElement("div");
cell.style.width="100px";
cell.style.height="100px";
cell.style.background="#222";
cell.style.display="flex";
cell.style.justifyContent="center";
cell.style.alignItems="center";
cell.style.fontSize="40px";
cell.onclick=()=>{
if(board[i]===""){
board[i]=turn;
cell.innerText=turn;
turn="O";
setTimeout(robot,300);
}
};
div.appendChild(cell);
});

function robot(){
let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
if(empty.length){
let r=empty[Math.floor(Math.random()*empty.length)];
board[r]="O";
div.children[r].innerText="O";
turn="X";
}
}

document.getElementById("gameArea").appendChild(div);
}

//////////////////// AI ////////////////////
function aiChat(){
let div=document.createElement("div");
div.innerHTML=`
<input id="msg" placeholder="Ask something">
<button onclick="reply()">Send</button>
<div id="chat"></div>
`;
document.getElementById("gameArea").appendChild(div);
}

function reply(){
let msg=document.getElementById("msg").value.toLowerCase();
let chat=document.getElementById("chat");
let res="I don't understand.";

if(msg.includes("hello")) res="Hello Rehan 🔥";
if(msg.includes("time")) res=new Date().toLocaleTimeString();
if(msg.includes("coins")) res="You have "+coins+" coins";

chat.innerHTML+="<p>> "+msg+"</p><p style='color:#00ff99;'>"+res+"</p>";
}

</script>
</body>
</html>
