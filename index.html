<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MR-7 Game Hub</title>

<style>
body{
  margin:0;
  background:black;
  color:#0f0;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:15px;
}

button{
  padding:10px 20px;
  margin:10px;
  background:black;
  color:#0f0;
  border:2px solid #0f0;
  cursor:pointer;
}

canvas{
  background:#111;
  display:none;
  margin:auto;
  border:2px solid #0f0;
}

#joystick{
  width:170px;
  height:170px;
  border-radius:50%;
  border:2px solid rgba(0,255,0,.6);
  margin:20px auto;
  position:relative;
  display:none;
  background:rgba(0,0,0,.4);
}

#stick{
  width:60px;
  height:60px;
  background:#0f0;
  border-radius:50%;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<h1>🎮 MR-7 Game Hub</h1>

<button onclick="startCar()">🚗 Car Game</button>
<button onclick="startBrick()">🧱 Brick Game</button>

<br>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<div id="joystick">
  <div id="stick"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let selectedGame = "";
let carX = 200;
let paddleX = 150;
let animation;

/* =====================
   START GAMES
===================== */
function startCar(){
  selectedGame="car";
  canvas.style.display="block";
  joystick.style.display="block";
  carX=200;
  gameLoop();
}

function startBrick(){
  selectedGame="brick";
  canvas.style.display="block";
  joystick.style.display="block";
  paddleX=150;
  gameLoop();
}

/* =====================
   GAME LOOP
===================== */
function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(selectedGame==="car"){
    ctx.fillStyle="lime";
    ctx.fillRect(carX,350,50,30);
  }

  if(selectedGame==="brick"){
    ctx.fillStyle="lime";
    ctx.fillRect(paddleX,370,100,15);
  }

  animation=requestAnimationFrame(gameLoop);
}

/* =======================
   JOYSTICK CONTROL
======================= */
let joyActive=false;
let joyCenterX=0;
let joyCenterY=0;

joystick.addEventListener("touchstart",(e)=>{
  joyActive=true;
  const rect=joystick.getBoundingClientRect();
  joyCenterX=rect.left+rect.width/2;
  joyCenterY=rect.top+rect.height/2;
});

joystick.addEventListener("touchmove",(e)=>{
  if(!joyActive) return;

  let touch=e.touches[0];
  let dx=touch.clientX-joyCenterX;
  let dy=touch.clientY-joyCenterY;

  let maxDist=50;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(dist>maxDist){
    dx=(dx/dist)*maxDist;
    dy=(dy/dist)*maxDist;
  }

  stick.style.transform=`translate(${dx}px,${dy}px)`;

  if(selectedGame==="car"){
    carX+=dx*0.05;
    if(carX<0) carX=0;
    if(carX>canvas.width-50) carX=canvas.width-50;
  }

  if(selectedGame==="brick"){
    paddleX+=dx*0.05;
    if(paddleX<0) paddleX=0;
    if(paddleX>canvas.width-100) paddleX=canvas.width-100;
  }

  e.preventDefault();
});

joystick.addEventListener("touchend",()=>{
  joyActive=false;
  stick.style.transform="translate(-50%,-50%)";
});
</script>

</body>
</html>
